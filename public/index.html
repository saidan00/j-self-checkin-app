<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Self Check-in</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=2">
</head>
<body>
  <img id="nyan-cat" class="nyan-cat" src="nyan-cat.gif" alt="Nyan Cat" aria-hidden="true">
  <img id="happy-mode" class="happy-mode hidden" src="happy_mode_off.gif" alt="Happy mode" aria-hidden="true">

  <main class="app">
    <header class="app-header fade-in">
      <h1>Self Check-in</h1>
      <p class="subtitle">Asia/Ho Chi Minh (UTC+7)</p>
    </header>

    <section class="clock-card card fade-in" aria-live="polite">
      <div id="clock-time" class="clock-time">--:--:--</div>
      <div id="clock-date" class="clock-date">Loading...</div>
    </section>

    <section id="status-card" class="status-card card fade-in hidden" aria-live="polite">
      <span class="status-icon" aria-hidden="true">✓</span>
      <p id="status-text">Checked in today</p>
    </section>

    <section id="go-home-card" class="go-home-card card fade-in hidden" aria-live="polite">
      <p id="go-home-text" class="go-home-text"></p>
      <p id="go-home-subtext" class="go-home-subtext"></p>
    </section>

    <div id="streak" class="streak-badge fade-in hidden">
      <span id="streak-text">0 day streak</span>
    </div>

    <section class="checkin-section fade-in">
      <button id="checkin-btn" type="button" class="checkin-btn">
        <span class="btn-label">Check In</span>
        <span class="btn-spinner hidden" aria-hidden="true"></span>
      </button>
    </section>

    <section class="history-section fade-in">
      <h2>Check-in History</h2>
      <div id="history-list" class="history-list" role="list"></div>
      <p id="history-empty" class="history-empty">No check-ins yet. Tap the button above to get started.</p>
    </section>
  </main>

  <div id="snackbar" class="snackbar" role="status" aria-live="polite"></div>

  <script src="app.js?v=2" defer></script>
</body>
</html>
